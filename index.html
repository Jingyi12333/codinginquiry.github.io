<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/vuetify@3.x/dist/vuetify.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.x/css/materialdesignicons.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3.x/dist/vuetify.min.js"></script>

    <script src="app.js" defer></script>

</head>

<body>

    <div id="app">
        <v-app>
            <v-main>
                <v-app>
                    <v-main>
                        <v-container>
                            <v-row>
                                <v-col col="4" v-for="item in collection" :key="item.name">


                                    <v-card width="250" height="350" class="mx-auto"
                                        color="purple-darken-1 elevation-12">
                                        <v-card-title>
                                            {{ item.name }}
                                        </v-card-title>
                                        <v-card-subtitle>
                                            {{item.taste}}
                                            {{item.smell}}

                                        </v-card-subtitle>


                                        <v-card-text>
                                            {{ item.bio }}


                                        </v-card-text>
                                        <v-img :src="item.image" height="200" > </v-img>




                                    </v-card>
                                </v-col>
                            </v-row>
                        </v-container>
                    </v-main>
                </v-app>
            </v-main>
        </v-app>
    </div>
</body>

</html>
